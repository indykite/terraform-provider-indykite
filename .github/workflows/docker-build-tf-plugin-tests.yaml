---
name: Docker Build Test Image
on: # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - docker/infra/**
      - tests/**
  # Master push only applies the `:latest` tag to the already-built versioned image.
  push:
    branches:
      - master
    paths:
      - docker/infra/**
      - tests/**
  # to have an ability to run the workflow manually
  workflow_dispatch: # yamllint disable-line rule:empty-values
#
permissions:
  contents: read
  id-token: write # mint OIDC token for keyless GCP auth via Workload Identity Federation (setup-buildx step)
  pull-requests: read # dorny/paths-filter reads the PR's changed files via the GitHub API on pull_request events
#
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      build_ci: ${{ steps.set-outputs.outputs.build_ci }}
      build_full: ${{ steps.set-outputs.outputs.build_full }}
      retag_ci: ${{ steps.set-outputs.outputs.retag_ci }}
      retag_full: ${{ steps.set-outputs.outputs.retag_full }}
      version_ci: ${{ steps.versions.outputs.version_ci }}
      version_full: ${{ steps.versions.outputs.version_full }}
    steps:
      - name: actions/checkout/fetch-depth
        id: fetch-depth
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              # Enough history to diff every commit in the PR against its base.
              echo "fetch-depth=$((${{ github.event.pull_request.commits }} + 1))" >> "$GITHUB_OUTPUT"
              ;;
            push)
              # One-commit diff against the previous master tip for the retag filters.
              echo "fetch-depth=2" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # workflow_dispatch rebuilds both images unconditionally; no diff needed.
              echo "fetch-depth=1" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - name: actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 - https://github.com/actions/checkout/releases
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ steps.fetch-depth.outputs.fetch-depth }}

      - name: dorny/paths-filter
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            ci:
              - 'docker/infra/**'
            full:
              - 'docker/infra/**'
              - 'tests/**'
            version_ci:
              - 'docker/infra/ci/.version'
            version_full:
              - 'docker/infra/full/.version'

      - name: Read versions
        id: versions
        run: |
          version_ci=$(cat docker/infra/ci/.version)
          version_full=$(cat docker/infra/full/.version)
          if [ -z "$version_ci" ]; then
            echo "::error::docker/infra/ci/.version is missing or empty"
            exit 1
          fi
          if [ -z "$version_full" ]; then
            echo "::error::docker/infra/full/.version is missing or empty"
            exit 1
          fi
          echo "version_ci=$version_ci" >> "$GITHUB_OUTPUT"
          echo "version_full=$version_full" >> "$GITHUB_OUTPUT"

      - name: Set build/retag outputs
        id: set-outputs
        run: |
          BUILD_CI=false
          BUILD_FULL=false
          RETAG_CI=false
          RETAG_FULL=false

          case "${{ github.event_name }}" in
            workflow_dispatch)
              # Manual runs rebuild both images but do not re-tag `latest`.
              BUILD_CI=true
              BUILD_FULL=true
              ;;
            pull_request)
              BUILD_CI="${{ steps.filter.outputs.ci }}"
              BUILD_FULL="${{ steps.filter.outputs.full }}"
              ;;
            push)
              # On merge to master: only re-tag the versioned image built during the PR as `latest`.
              RETAG_CI="${{ steps.filter.outputs.version_ci }}"
              RETAG_FULL="${{ steps.filter.outputs.version_full }}"
              ;;
          esac

          {
            echo "build_ci=$BUILD_CI"
            echo "build_full=$BUILD_FULL"
            echo "retag_ci=$RETAG_CI"
            echo "retag_full=$RETAG_FULL"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build and publish infra images
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.build_ci == 'true' ||
      needs.detect-changes.outputs.build_full == 'true' ||
      needs.detect-changes.outputs.retag_ci == 'true' ||
      needs.detect-changes.outputs.retag_full == 'true'
    env:
      ARTIFACT_REGISTRY_URL: europe-west1-docker.pkg.dev
      GCP_PROJECT_ID_MGMT: ${{ secrets.GCP_PROJECT_ID_MGMT }}
      IMAGE_NAME_CI: terraform-plugin-tests-ci
      IMAGE_NAME_FULL: terraform-plugin-tests
    runs-on: ubuntu-latest
    steps:
      - name: actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 - https://github.com/actions/checkout/releases

      - name: docker/setup-buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 - https://github.com/docker/setup-buildx-action/releases

      - name: Setup GCP Auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0 - https://github.com/google-github-actions/auth/releases
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_MGMT }}
          service_account: github@${{ env.GCP_PROJECT_ID_MGMT }}.iam.gserviceaccount.com

      - name: login to docker hub
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_URL }} -q

      - name: Build terraform-plugin-tests
        # --- full image (tests baked in) — warms BuildKit cache for the second build ---
        if: needs.detect-changes.outputs.build_full == 'true'
        run: |-
          image_base="${ARTIFACT_REGISTRY_URL}/${GCP_PROJECT_ID_MGMT}/indykite/${{ env.IMAGE_NAME_FULL }}"
          docker buildx build --push \
            -f docker/infra/Dockerfile \
            --target ${{ env.IMAGE_NAME_FULL }} \
            --tag "${image_base}:${{ needs.detect-changes.outputs.version_full }}" \
            --platform linux/amd64,linux/arm64 .

      # --- ci image (no baked-in tests), reuses layers from above ---
      - name: Build terraform-plugin-testsci (pipeline)
        if: needs.detect-changes.outputs.build_ci == 'true'
        run: |-
          image_base="${ARTIFACT_REGISTRY_URL}/${GCP_PROJECT_ID_MGMT}/indykite/${{ env.IMAGE_NAME_CI }}"
          docker buildx build --push \
            -f docker/infra/Dockerfile \
            --target ${{ env.IMAGE_NAME_CI }} \
            --tag "${image_base}:${{ needs.detect-changes.outputs.version_ci }}" \
            --platform linux/amd64,linux/arm64 .

      # --- tag `latest` on master push (after PR merge). Manifest-level retag preserves multi-arch. ---
      - name: Tag latest — terraform-plugin-tests
        if: needs.detect-changes.outputs.retag_full == 'true'
        run: |-
          image_base="${{ vars.ARTIFACT_REGISTRY_URL }}/${{ secrets.GCP_PROJECT_ID_MGMT }}/indykite/${{ env.IMAGE_NAME_FULL }}"
          docker buildx imagetools create \
            --tag "${image_base}:latest" \
            "${image_base}:${{ needs.detect-changes.outputs.version_full }}"

      - name: Tag latest — terraform-plugin-tests-ci (pipeline)
        if: needs.detect-changes.outputs.retag_ci == 'true'
        run: |-
          image_base="${{ vars.ARTIFACT_REGISTRY_URL }}/${{ secrets.GCP_PROJECT_ID_MGMT }}/indykite/${{ env.IMAGE_NAME_CI }}"
          docker buildx imagetools create \
            --tag "${image_base}:latest" \
            "${image_base}:${{ needs.detect-changes.outputs.version_ci }}"
