---
name: Tests/Lint
on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, synchronize, reopened]
  # Run on master too to save cache, which can be shared into PR too
  push:
    branches:
      - master
  # to have an ability to run the workflow manually
  workflow_dispatch: # yamllint disable-line rule:empty-values
#
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
# "all of those that are not specified are set to none."
permissions:
  contents: read # work with the contents of the repository
#
jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: actions/checkout
        uses: indykite/.github/.github/actions/git-checkout@master # actions/checkout with dynamic fetch-depth resolution

      - name: setup/golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 - https://github.com/actions/setup-go/releases
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1 - https://github.com/golangci/golangci-lint-action/releases
        with:
          version: v2.12.2 # optional, https://github.com/golangci/golangci-lint/releases
          # Optional: golangci-lint command line arguments.
          args: --config=.golangci.yml --timeout 3m00s
