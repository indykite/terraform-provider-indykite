---
name: Tests
on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master
  # to have an ability to run thee workflow manually
  workflow_dispatch: # yamllint disable-line rule:empty-values
#
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true
#
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
# "all of those that are not specified are set to none."
permissions:
  contents: read # work with the contents of the repository
#
jobs:
  test-integration:
    name: Integration
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      INDYKITE_APPLICATION_CREDENTIALS: ${{ secrets.SERVICE_ACCOUNT_CREDENTIALS }}
      INDYKITE_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.SERVICE_ACCOUNT_CREDENTIALS }}
      CUSTOMER_ID: ${{secrets.CUSTOMER_ID}}
      TF_VAR_LOCATION_ID: ${{secrets.LOCATION_ID}}
    steps:
      - name: actions/checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 - https://github.com/actions/checkout/releases

      - name: setup/golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 - https://github.com/actions/setup-go/releases
        with:
          go-version-file: go.mod

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform Init and Apply
        run: |-
          make build_test_local_plugin integration
