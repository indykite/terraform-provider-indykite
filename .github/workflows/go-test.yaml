---
name: Tests
on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["dev", "develop", "main", "master"]
  # Run on default branch for cache generation & to report coverage on master branch to Codecov
  push:
    branches: ["dev", "develop", "main", "master"]
  # to have an ability to run thee workflow manually
  workflow_dispatch: # yamllint disable-line rule:empty-values
#
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true
#
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
# "all of those that are not specified are set to none."
permissions:
  contents: read # work with the contents of the repository
#
jobs:
  test:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: actions/checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 - https://github.com/actions/checkout/releases

      - name: setup/golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 - https://github.com/actions/setup-go/releases
        with:
          go-version-file: go.mod

      # Pre-install Terraform so the plugin SDK doesn't try to download it and
      # hit HashiCorp's expired PGP signing key.
      - name: setup/terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - name: Run Unit tests.
        run: |
          TF_ACC_TERRAFORM_PATH="$(command -v terraform)"
          export TF_ACC_TERRAFORM_PATH
          echo "Using Terraform at: ${TF_ACC_TERRAFORM_PATH}"
          "${TF_ACC_TERRAFORM_PATH}" version
          make test

      - name: codecov/upload-coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0 - https://github.com/codecov/codecov-action/releases
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          # Notify us when failed, so devs are not waiting for Codecov report when it will never come.
          # Because Codecov report is required to be able to merge, we have to run again the whole test anyway.
          fail_ci_if_error: true
