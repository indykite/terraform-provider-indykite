---
# In case this action is failing, try to check for any updates or follow Publishing Provider tutorial at HashiCorp.
# https://developer.hashicorp.com/terraform/registry/providers/publishing#github-actions-preferred
name: Terraform release
on: # yamllint disable-line rule:truthy
  push:
    tags:
      - v*
  # to have an ability to run thee workflow manually
  workflow_dispatch: # yamllint disable-line rule:empty-values

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 - https://github.com/actions/checkout/releases
        with:
          fetch-depth: 0

      - name: setup/golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 - https://github.com/actions/setup-go/releases
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0 - https://github.com/crazy-max/ghaction-import-gpg/releases
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2 - https://github.com/goreleaser/goreleaser-action/releases
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          # GitHub sets this automatically
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack Notification Failure
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0 - https://github.com/rtCamp/action-slack-notify/releases
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_RELEASE_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: 'Publishing to Terraform Registry failed :boom:'
          SLACK_MESSAGE: See the action for more info.`
          SLACK_USERNAME: Release BOT
          SLACK_ICON_EMOJI: ':alert:'
          SLACK_FOOTER: Kick ass!!!
