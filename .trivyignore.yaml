---
# https://trivy.dev/latest/docs/configuration/filtering/#trivyignoreyaml

misconfigurations:
  - id: AVD-DS-0026 # (LOW): Add HEALTHCHECK instruction in your Dockerfile
    paths:
      - "docker/infra/Dockerfile"
      - "docker/local/ForJarvisProtoLocal.Dockerfile"

vulnerabilities:
  - id: GO-2026-5932 # (UNKNOWN): golang.org/x/crypto/openpgp is unmaintained; no fixed version exists.
    # Transitive-only dependency (via terraform-plugin-sdk chain), our code never imports or calls
    # openpgp (verified with govulncheck). Remove once upstream drops the openpgp package.
    paths:
      - "go.mod"
